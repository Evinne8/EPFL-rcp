services:
  # --- Moteur de recherche SearXNG ---
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    networks:
      - ai-network
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
    restart: always

  # --- Interface Open WebUI ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    networks:
      - ai-network
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      # Recherche Web (SearXNG)
      - ENABLE_WEB_SEARCH=True
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      
      # URL de l'instance
      - WEBUI_URL=${WEBUI_URL}
      
      # Configuration Entra ID (OIDC)
      - ENABLE_OAUTH_SIGNUP=true
      - ENABLE_OAUTH_PERSISTENT_CONFIG=false
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_CLIENT_TENANT_ID=${MICROSOFT_CLIENT_TENANT_ID}
      - OPENID_PROVIDER_URL=https://login.microsoftonline.com/${MICROSOFT_CLIENT_TENANT_ID}/v2.0/.well-known/openid-configuration
      - MICROSOFT_OAUTH_SCOPE=openid email profile
      - MICROSOFT_REDIRECT_URI=${WEBUI_URL}/oauth/microsoft/callback
    restart: always

networks:
  ai-network:
    driver: bridge

volumes:
  open-webui:
